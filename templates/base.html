<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Telegram AI Chat{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --telegram-blue: #0088cc;
            --telegram-dark: #17212b;
            --telegram-light: #f5f5f5;
            --telegram-border: #eaeaea;
            --message-sent: #e3f2fd;
            --message-received: #ffffff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--telegram-light);
            height: 100vh;
            overflow: hidden;
        }
        
        .chat-container {
            display: flex;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        
        .sidebar {
            width: 350px;
            background: white;
            border-right: 1px solid var(--telegram-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .sidebar-header {
            padding: 15px;
            background: var(--telegram-dark);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .sidebar-search {
            padding: 10px;
            background: #f0f0f0;
        }
        
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
        }
        
        .chat-item {
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid var(--telegram-border);
            transition: background 0.2s;
            display: flex;
            align-items: center;
        }
        
        .chat-item:hover {
            background: #f5f5f5;
        }
        
        .chat-item.active {
            background: #e3f2fd;
        }
        
        .chat-item img, .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 12px;
        }
        
        .chat-info {
            flex: 1;
        }
        
        .chat-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        
        .chat-last-message {
            font-size: 13px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-meta {
            text-align: right;
            min-width: 60px;
        }
        
        .chat-time {
            font-size: 12px;
            color: #888;
        }
        
        .unread-badge {
            background: var(--telegram-blue);
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-top: 4px;
            display: inline-block;
        }
        
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }
        
        .chat-header {
            padding: 15px 20px;
            background: var(--telegram-dark);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .chat-header-info {
            display: flex;
            align-items: center;
        }
        
        .chat-header-info img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 12px;
        }
        
        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #efeae2;
        }
        
        .message {
            max-width: 60%;
            margin-bottom: 10px;
            padding: 10px 15px;
            border-radius: 12px;
            position: relative;
        }
        
        .message.sent {
            margin-left: auto;
            background: var(--message-sent);
            border-bottom-right-radius: 2px;
        }
        
        .message.received {
            background: var(--message-received);
            border-bottom-left-radius: 2px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .message-content {
            word-wrap: break-word;
        }
        
        .message-time {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
            text-align: right;
        }
        
        .message-sender {
            font-size: 12px;
            font-weight: 600;
            color: var(--telegram-blue);
            margin-bottom: 4px;
        }
        
        .message-input-container {
            padding: 15px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .message-input {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 20px;
            resize: none;
            outline: none;
            font-size: 14px;
        }
        
        .send-btn {
            padding: 10px 20px;
            background: var(--telegram-blue);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .send-btn:hover {
            background: #0077b3;
        }
        
        .online-dot {
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
            position: absolute;
            bottom: 0;
            right: 0;
            border: 2px solid white;
        }
        
        .status-icon {
            font-size: 14px;
            color: #888;
        }
        
        .empty-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #888;
        }
        
        .empty-chat i {
            font-size: 80px;
            margin-bottom: 20px;
            color: #ddd;
        }
        
        .nav-link-custom {
            color: white;
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.2s;
        }
        
        .nav-link-custom:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .section-title {
            padding: 10px 15px;
            font-size: 12px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            background: #f5f5f5;
        }
        
        .ai-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
        }
        
        .group-badge {
            background: var(--telegram-blue);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
            }
            
            .main-chat {
                display: none;
            }
            
            .main-chat.active {
                display: flex;
            }
            
            .sidebar.hidden {
                display: none;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
