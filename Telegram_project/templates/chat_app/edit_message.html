{% extends 'base.html' %}

{% block title %}Edit Message - Telegram AI{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                
                <div class="card-header">
                    <h4 class="mb-0">
                        <i class="fas fa-edit me-2"></i>Edit Message
                    </h4>
                </div>

                <div class="card-body">

                    <!-- Show messages -->
                    {% if messages %}
                        {% for msg in messages %}
                            <div class="alert alert-{{ msg.tags }}">
                                {{ msg }}
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Message Content</label>

                            <!-- SAFE fallback -->
                            <textarea 
                                name="content" 
                                class="form-control" 
                                rows="4" 
                                required
                            >{{ message.content|default:"" }}</textarea>
                        </div>

                        <div class="d-flex justify-content-between">

                            <!-- SAFE URL (no crash) -->
                            <a href="{% url 'chat_view' chat_id|default:0 %}" 
                               class="btn btn-outline-secondary">
                                <i class="fas fa-arrow-left me-2"></i>Cancel
                            </a>

                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-2"></i>Save
                            </button>

                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
