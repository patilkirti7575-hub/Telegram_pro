{% extends 'base.html' %}

{% block title %}Profile{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card text-center">
                <div class="card-body">
                    <div class="avatar" style="width:100px; height:100px; font-size:40px; margin:0 auto 20px; background:#0088cc;">
                        {{ user.username|slice:":1"|upper }}
                    </div>
                    <h3>{{ user.username }}</h3>
                    <p class="text-muted">{{ user.email }}</p>
                    <p>{% if user.is_online %}🟢 Online{% else %}⚫ Offline{% endif %}</p>
                    
                    <hr>
                    <a href="{% url 'chat_list' %}" class="btn btn-primary">← Back to Chats</a>
                    <a href="{% url 'logout' %}" class="btn btn-outline-danger">Logout</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
