<div style="padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1);">
    <div style="display: flex; align-items: center; gap: 12px;">
        <div style="width: 45px; height: 45px; background: linear-gradient(135deg, #0ea5e9, #0284c7); border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);">
            <i class="fas fa-crown" style="font-size: 22px; color: white;"></i>
        </div>
        <div>
            <h5 style="font-size: 18px; font-weight: 700; margin: 0; background: linear-gradient(135deg, #0ea5e9, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Royal Chat</h5>
            <span style="font-size: 11px; color: rgba(255,255,255,0.7);">{{ user.username }}</span>
        </div>
    </div>
</div>

<div style="padding: 15px;">
    <a href="{% url 'chat_list' %}" style="display: flex; align-items: center; gap: 10px; padding: 12px 15px; background: rgba(14, 165, 233, 0.2); border-radius: 10px; color: white; text-decoration: none; margin-bottom: 10px;">
        <i class="fas fa-comment-dots"></i>
        <span>My Chats</span>
    </a>
    <a href="{% url 'ai_chat' %}" style="display: flex; align-items: center; gap: 10px; padding: 12px 15px; background: rgba(139, 92, 246, 0.2); border-radius: 10px; color: white; text-decoration: none; margin-bottom: 10px;">
        <i class="fas fa-robot"></i>
        <span>AI Chat</span>
    </a>
    <a href="{% url 'status_list' %}" style="display: flex; align-items: center; gap: 10px; padding: 12px 15px; background: rgba(236, 72, 153, 0.2); border-radius: 10px; color: white; text-decoration: none; margin-bottom: 10px;">
        <i class="fas fa-circle"></i>
        <span>Status</span>
    </a>
    <a href="{% url 'search_users' %}" style="display: flex; align-items: center; gap: 10px; padding: 12px 15px; background: rgba(16, 185, 129, 0.2); border-radius: 10px; color: white; text-decoration: none; margin-bottom: 10px;">
        <i class="fas fa-search"></i>
        <span>Search</span>
    </a>
    <a href="{% url 'settings' %}" style="display: flex; align-items: center; gap: 10px; padding: 12px 15px; background: rgba(245, 158, 11, 0.2); border-radius: 10px; color: white; text-decoration: none; margin-bottom: 10px;">
        <i class="fas fa-cog"></i>
        <span>Settings</span>
    </a>
</div>

<div style="padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: auto;">
    <div style="display: flex; align-items: center; justify-content: space-between;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div style="width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #0ea5e9, #0284c7); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">
                {{ user.username|slice:":1"|upper }}
            </div>
            <div>
                <div style="color: white; font-weight: 500;">{{ user.username }}</div>
                <a href="{% url 'logout' %}" style="color: rgba(255,255,255,0.6); font-size: 12px; text-decoration: none;">Logout</a>
            </div>
        </div>
    </div>
</div>
