<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Royal Chat{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --bg-dark: #1a1a2e;
            --bg-sidebar: #16213e;
            --bg-chat: #ffffff;
            --bg-header: #0f3460;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --border: #2d3748;
            --message-sent: #0ea5e9;
            --message-received: #ffffff;
            --success: #10b981;
            --danger: #ef4444;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }
        
        .chat-container {
            display: flex;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        
        /* Sidebar */
        .sidebar {
            width: 350px;
            background: linear-gradient(180deg, var(--bg-sidebar) 0%, #0f172a 100%);
            border-right: 2px solid rgba(14, 165, 233, 0.3);
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 25px;
            background: linear-gradient(135deg, var(--bg-header) 0%, #1e3a8a 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(14, 165, 233, 0.3);
        }
        
        .sidebar-header h5 {
            font-weight: 700;
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--primary);
        }
        
        .sidebar-header h5 i { color: var(--primary); }
        
        .btn-logout {
            background: rgba(14, 165, 233, 0.2);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .btn-logout:hover {
            background: var(--primary);
            color: white;
        }
        
        .sidebar-search {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }
        
        .search-input {
            background: rgba(14, 165, 233, 0.1);
            border: 1px solid rgba(14, 165, 233, 0.3);
            color: white;
            border-radius: 25px;
            padding: 12px 22px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .search-input:focus {
            background: rgba(14, 165, 233, 0.15);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.2);
            outline: none;
            color: white;
        }
        
        .search-input::placeholder { color: var(--text-secondary); }
        
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }
        
        .section-title {
            padding: 18px 22px 12px;
            font-size: 11px;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .chat-item {
            padding: 15px 22px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
            border-left: 4px solid transparent;
        }
        
        .chat-item:hover {
            background: rgba(14, 165, 233, 0.15);
            border-left-color: var(--primary);
        }
        
        .chat-item.active {
            background: linear-gradient(90deg, rgba(14, 165, 233, 0.3) 0%, rgba(14, 165, 233, 0.1) 100%);
            border-left-color: var(--success);
        }
        
        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, #06b6d4 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: white;
            position: relative;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
        }
        
        .online-dot {
            width: 14px;
            height: 14px;
            background: var(--success);
            border-radius: 50%;
            position: absolute;
            bottom: 0;
            right: 0;
            border: 3px solid var(--bg-sidebar);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }
        
        .chat-info { flex: 1; min-width: 0; }
        
        .chat-name {
            font-weight: 600;
            font-size: 16px;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        
        .chat-last-message {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-meta { text-align: right; flex-shrink: 0; }
        
        .chat-time {
            font-size: 11px;
            color: var(--text-secondary);
        }
        
        /* Main Chat */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-chat);
        }
        
        .chat-header {
            padding: 20px 30px;
            background: linear-gradient(135deg, var(--bg-header) 0%, #1e3a8a 100%);
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 2px solid rgba(14, 165, 233, 0.3);
        }
        
        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 18px;
        }
        
        .chat-header-info .avatar {
            width: 48px;
            height: 48px;
            font-size: 18px;
        }
        
        .chat-header h4 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 3px;
        }
        
        .user-status {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .user-status.online { color: var(--success); }
        
        .btn-back {
            display: none;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
        }
        
        .messages-container {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background: linear-gradient(180deg, #f0f9ff 0%, #e0f2fe 100%);
        }
        
        .message {
            max-width: 65%;
            margin-bottom: 15px;
            padding: 14px 20px;
            border-radius: 20px;
            position: relative;
            animation: slideIn 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.sent {
            margin-left: auto;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border-bottom-right-radius: 6px;
        }
        
        .message.received {
            background: white;
            color: #1e293b;
            border-bottom-left-radius: 6px;
        }
        
        .message-content {
            word-wrap: break-word;
            line-height: 1.6;
            font-size: 15px;
        }
        
        .message.sent .message-content {
            color: #ffffff;
        }
        
        .message.sent .message-time {
            color: rgba(255, 255, 255, 0.9);
        }
        
        .message-time {
            font-size: 10px;
            opacity: 0.8;
            margin-top: 6px;
            text-align: right;
        }
        
        .message img {
            max-width: 280px;
            border-radius: 12px;
            margin-top: 8px;
        }
        
        .message-attachment-img {
            max-width: 300px;
            max-height: 300px;
            border-radius: 12px;
            margin-top: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .message-attachment-img:hover {
            transform: scale(1.02);
        }
        
        .message-attachment-video {
            max-width: 300px;
            border-radius: 12px;
            margin-top: 8px;
        }
        
        .message .message-attachment-img {
            display: block;
        }
        
        .message-input-container {
            padding: 15px 20px;
            background: white;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #e2e8f0;
        }
        
        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .message-input {
            flex: 1;
            padding: 12px 130px 12px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 24px;
            resize: none;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s;
            min-height: 48px;
            max-height: 150px;
            line-height: 1.5;
            overflow-y: auto;
            word-break: break-word;
        }
        
        .message-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }
        
        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
            flex-shrink: 0;
        }
        
        .send-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.5);
        }
        
        .send-btn:active {
            transform: scale(0.95);
        }
        
        .send-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        
        .send-btn:hover .send-icon {
            transform: translateX(2px) translateY(-1px);
        }
        
        .send-btn i { font-size: 16px; }
        
        .input-action-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: #f1f5f9;
            border: none;
            color: #64748b;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }
        
        .input-action-btn:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
        }
        
        .input-action-btn i {
            font-size: 16px;
        }
        
        .empty-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #f0f9ff 0%, #e0f2fe 100%);
            color: #64748b;
        }
        
        .empty-chat i {
            font-size: 100px;
            margin-bottom: 25px;
            color: var(--primary);
            opacity: 0.5;
        }
        
        .empty-chat h3 { color: #1e293b; }
        
        /* Auth Pages */
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #0f172a 50%, #1e3a8a 100%);
            padding: 20px;
        }
        
        .auth-card {
            background: rgba(22, 33, 62, 0.95);
            border-radius: 30px;
            padding: 50px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(14, 165, 233, 0.3);
        }
        
        .auth-card h2 {
            text-align: center;
            margin-bottom: 35px;
            font-size: 28px;
            color: var(--primary);
        }
        
        .auth-card input {
            background: rgba(14, 165, 233, 0.1);
            border: 1px solid rgba(14, 165, 233, 0.3);
            color: white;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .auth-card input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.3);
            outline: none;
            color: white;
        }
        
        .auth-card input::placeholder { color: var(--text-secondary); }
        
        .auth-card .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .auth-card .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(14, 165, 233, 0.4);
        }
        
        .auth-card p {
            color: var(--text-secondary);
            text-align: center;
            margin-top: 25px;
        }
        
        .auth-card a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
        
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: 0;
                top: 0;
                height: 100%;
                width: 100%;
                z-index: 1000;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            
            .sidebar.show { transform: translateX(0); }
            
            .message { max-width: 85%; }
            
            .btn-back { display: block !important; }
            
            .sidebar-header .btn-back { display: block !important; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
